<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hide and Show Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="input-box">
    <!-- here we write type=password so it is hidden if we write type=text so it is visible generally means password is display in text form  so by default it is in password form i.e hidden form (in circle type form)-->
    <input type="password" placeholder="Enter Password" id="password">
    <img src="eye-close.png" id="eyeicon" >
   </div>


   <script>

    let password=document.getElementById("password");
    let eyeicon=document.getElementById("eyeicon");


    // by default password is hidden means it is not in text form, it is in circle form type(i.e in password type)
    eyeicon.onclick=function(){
      if(password.type =="password"){
        password.type ="text";
        eyeicon.src="eye-open.png";
      }else{
        password.type="password";
        eyeicon.src="eye-close.png";
      }
    }
   </script>
</body>
</html>
